{% set name = "sagemaker_pyspark" %}
{% set version = "1.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 178bcdd07df6d0631d469038e62329d32ea376a321c3a7ad3b88884b49be4ed1

build:
  noarch: python
  number: 2
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - pyspark >=2.3.2
    - numpy
    - pytest-runner
    - pypandoc
  run:
    - python >={{ python_min }},<3.8
    - py4j
    - pyspark >=2.3.2

test:
  requires:
    - python {{ python_min }}
  imports:
    - sagemaker_pyspark

about:
  home: https://github.com/aws/sagemaker-spark
  license: Apache-2.0
  license_family: APACHE
  license_file:
    - licenses/LICENSE-hadoop.txt
    - licenses/LICENSE-htrace.txt
  summary: Amazon SageMaker PySpark Bindings
  dev_url: https://github.com/aws/sagemaker-spark

extra:
  recipe-maintainers:
    - mxr-conda
    - oblute
    - benhuff
    - rluria14
